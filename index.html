<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hold to Win</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    margin:0;
    overflow:hidden;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(-45deg,#111,#1b1b3a,#121212,#25124a);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

#game{
    transition:1s;
}

.blur{
    filter:blur(10px);
}

button{
    width:180px;
    height:180px;
    border-radius:50%;
    border:none;
    cursor:pointer;

    font-size:38px;
    font-weight:bold;
    letter-spacing:4px;

    color:white;

    background:linear-gradient(135deg,#7b2cff,#00c8ff);

    animation:pulse 2s infinite;

    transition:.2s;
}

@keyframes pulse{

    0%{
        transform:scale(1);
        box-shadow:0 0 20px rgba(123,44,255,.4);
    }

    50%{
        transform:scale(1.08);
        box-shadow:0 0 45px rgba(0,200,255,.6);
    }

    100%{
        transform:scale(1);
        box-shadow:0 0 20px rgba(123,44,255,.4);
    }

}

button.holding{

    animation:none;

    transform:scale(1.1);

    box-shadow:
        0 0 40px #7b2cff,
        0 0 80px #7b2cff,
        0 0 120px #00c8ff,
        0 0 180px #00c8ff;

}

#winner{

    position:fixed;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:110px;
    font-weight:900;

    color:white;

    opacity:0;

    transform:scale(.3);

    transition:1s;

    text-shadow:
        0 0 15px white,
        0 0 40px #00c8ff,
        0 0 70px #7b2cff;
}

#winner.show{

    opacity:1;

    transform:scale(1);

    animation:win 1s ease forwards;

}

@keyframes win{

    0%{
        transform:scale(.2) rotate(-10deg);
    }

    60%{
        transform:scale(1.25) rotate(4deg);
    }

    100%{
        transform:scale(1);
    }

}
</style>

</head>
<body>

<div class="progress-container">
    <div class="progress" id="progress"></div>
</div>

<div id="game">
    <button id="holdBtn">Hold Me</button>
</div>

<div id="winner">
    🎉 You Win! 🎉
</div>

<script>
const holdTime = 180000; // 3 minúty

let holding = false;
let progress = 0;

const progressBar = document.getElementById("progress");
const btn = document.getElementById("holdBtn");

function startHolding(){
    holding = true;
    btn.classList.add("holding");
}

function stopHolding(){
    holding = false;
    btn.classList.remove("holding");
}

btn.addEventListener("mousedown",startHolding);
btn.addEventListener("mouseup",stopHolding);
btn.addEventListener("mouseleave",stopHolding);

btn.addEventListener("touchstart",(e)=>{
    e.preventDefault();
    startHolding();
});

btn.addEventListener("touchend",stopHolding);

const interval = 20;

setInterval(()=>{

    if(holding){
        progress += interval;

        if(progress>holdTime)
            progress=holdTime;

        progressBar.style.width=(progress/holdTime*100)+"%";

        if(progress>=holdTime){

            document.getElementById("game").classList.add("blur");

            document.querySelector(".progress-container").classList.add("blur");

            document.getElementById("winner").classList.add("show");

        }

    }

},interval);
</script>

</body>
  </html>
