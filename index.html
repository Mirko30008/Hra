<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hold to Win</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    margin:0;
    overflow:hidden;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(-45deg,#111,#1b1b3a,#121212,#25124a);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

#game{
    transition:1s;
}

.blur{
    filter:blur(10px);
}

button{
    width:180px;
    height:180px;
    border-radius:50%;
    border:none;
    cursor:pointer;

    font-size:38px;
    font-weight:bold;
    letter-spacing:4px;

    color:white;

    background:linear-gradient(135deg,#7b2cff,#00c8ff);

    animation:pulse 2s infinite;

    transition:.2s;
}

@keyframes pulse{

    0%{
        transform:scale(1);
        box-shadow:0 0 20px rgba(123,44,255,.4);
    }

    50%{
        transform:scale(1.08);
        box-shadow:0 0 45px rgba(0,200,255,.6);
    }

    100%{
        transform:scale(1);
        box-shadow:0 0 20px rgba(123,44,255,.4);
    }

}

button.holding{

    animation:none;

    transform:scale(1.1);

    box-shadow:
        0 0 40px #7b2cff,
        0 0 80px #7b2cff,
        0 0 120px #00c8ff,
        0 0 180px #00c8ff;

}

#winner{

    position:fixed;
    inset:0;

    display:flex;
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
    background:linear-gradient(-45deg,#0f172a,#312e81,#111827,#1e1b4b);
    background-size:400% 400%;
    animation:bgMove 10s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.progress-container{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    width:92%;
    height:16px;
    background:rgba(255,255,255,.15);
    border-radius:30px;
    overflow:hidden;
}

.progress{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#00d4ff,#7b2cff);
    border-radius:30px;
}

#game{
    transition:1s;
}

.blur{
    filter:blur(10px);
}

button{
    width:170px;
    height:170px;
    border:none;
    border-radius:50%;
    color:white;
    font-size:34px;
    font-weight:bold;
    letter-spacing:4px;
    background:linear-gradient(135deg,#8b5cf6,#06b6d4);
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{
        transform:scale(1);
        box-shadow:0 0 15px #8b5cf666;
    }
    50%{
        transform:scale(1.08);
        box-shadow:0 0 40px #06b6d4aa;
    }
    100%{
        transform:scale(1);
        box-shadow:0 0 15px #8b5cf666;
    }
}

button.holding{
    animation:none;
    transform:scale(1.08);
    box-shadow:
        0 0 30px #8b5cf6,
        0 0 60px #8b5cf6,
        0 0 100px #06b6d4,
        0 0 140px #06b6d4;
}

#winner{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:18vw;
    font-weight:900;
    color:white;
    text-align:center;
    opacity:0;
    transform:scale(.2);
    transition:1s;
    text-shadow:
        0 0 15px white,
        0 0 40px #06b6d4,
        0 0 80px #8b5cf6;
}

#winner.show{
    opacity:1;
    transform:scale(1);
    animation:win 1s ease;
}

@keyframes win{
    0%{
        transform:scale(.2) rotate(-8deg);
    }
    60%{
        transform:scale(1.2) rotate(4deg);
    }
    100%{
        transform:scale(1);
    }
}
</style>

</head>
<body>

<div class="progress-container">
    <div class="progress" id="progress"></div>
</div>

<div id="game">
    <button id="holdBtn">Hold Me</button>
</div>

<div id="winner">
    🎉 You Win! 🎉
</div>

<script>
const holdTime = 180000; // 3 minúty

let holding = false;
let progress = 0;

const progressBar = document.getElementById("progress");
const btn = document.getElementById("holdBtn");

function startHolding(){
    holding = true;
    btn.classList.add("holding");
}

function stopHolding(){
    holding = false;
    btn.classList.remove("holding");
}

btn.addEventListener("pointerdown", startHolding);
btn.addEventListener("pointerup", stopHolding);
btn.addEventListener("pointercancel", stopHolding);
btn.addEventListener("pointerleave", stopHolding);
btn.addEventListener("mouseleave",stopHolding);

btn.addEventListener("touchstart",(e)=>{
    e.preventDefault();
    startHolding();
});

btn.addEventListener("touchend",stopHolding);

const interval = 20;

setInterval(()=>{

    if(holding){
        progress += interval;

        if(progress>holdTime)
            progress=holdTime;

        progressBar.style.width=(progress/holdTime*100)+"%";

        if(progress>=holdTime){

            document.getElementById("game").classList.add("blur");

            document.querySelector(".progress-container").classList.add("blur");

            document.getElementById("winner").classList.add("show");

        }

    }

},interval);
</script>

</body>
  </html>
