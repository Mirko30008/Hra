<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Click To Win</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Segoe UI,sans-serif;height:100vh;overflow:hidden;display:flex;justify-content:center;align-items:center;background:linear-gradient(-45deg,#0f172a,#1e1b4b,#111827,#312e81);background-size:400% 400%;animation:bg 12s ease infinite}
@keyframes bg{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
#hud{position:fixed;top:25px;left:50%;transform:translateX(-50%);width:min(520px,85vw);transition:.8s}
.bar{height:22px;background:#ffffff22;border-radius:30px;padding:4px}
#progress{height:100%;width:0;background:linear-gradient(90deg,#06b6d4,#8b5cf6);border-radius:30px;transition:width .08s linear,background .5s}
.gold{background:linear-gradient(90deg,#ffd700,#ffb300,#fff59d)!important;animation:gold 1s infinite}
@keyframes gold{50%{filter:drop-shadow(0 0 16px gold)}}
#label{text-align:center;color:#fff;margin-top:10px}
#wrap{transition:.8s}
.blur{filter:blur(16px);transform:scale(.94);pointer-events:none}
button{cursor:pointer}
#click{width:190px;height:190px;border:none;border-radius:50%;font-size:32px;font-weight:900;color:#fff;background:linear-gradient(135deg,#8b5cf6,#06b6d4);animation:pulse 2s infinite}
@keyframes pulse{50%{transform:scale(1.06);box-shadow:0 0 40px #06b6d4}}
#click:active{transform:scale(.92)}
.pop{position:fixed;color:#22d3ee;font-weight:bold;pointer-events:none;animation:pop .7s forwards}
@keyframes pop{to{transform:translateY(-80px) scale(1.4);opacity:0}}
#win{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;opacity:0;visibility:hidden;background:rgba(0,0,0,.2);backdrop-filter:blur(0);transition:.8s}
#win.show{opacity:1;visibility:visible;backdrop-filter:blur(8px)}
h1{font-size:4rem;color:#fff;text-shadow:0 0 25px cyan,0 0 60px violet;animation:bounce .9s}
@keyframes bounce{0%{transform:scale(.2);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
#restart{margin-top:25px;padding:16px 34px;border:none;border-radius:30px;background:linear-gradient(135deg,#8b5cf6,#06b6d4);color:#fff;font-size:18px}
</style>
</head>
<body>
<div id="hud"><div class="bar"><div id="progress"></div></div><div id="label">0 / 100</div></div>
<div id="wrap"><button id="click">CLICK</button></div>
<div id="win"><h1>🎉 YOU WIN! 🎉</h1><button id="restart">Start New Game</button></div>
<script>
const target=100;
let clicks=0;
const p=progress,label=document.getElementById("label"),btn=document.getElementById("click");
btn.onclick=e=>{
 if(clicks>=target)return;
 clicks++;
 let percent=clicks/target*100;
 p.style.width=percent+"%";
 label.textContent=`${clicks} / ${target}`;
 let d=document.createElement("div");
 d.className="pop"; d.textContent="+1";
 d.style.left=e.clientX+"px"; d.style.top=e.clientY+"px";
 document.body.appendChild(d);
 setTimeout(()=>d.remove(),700);
 if(clicks===target)win();
}
function win(){
 p.classList.add("gold");
 label.textContent="100% COMPLETE!";
 setTimeout(()=>{
   wrap.classList.add("blur");
   hud.classList.add("blur");
   winScreen=document.getElementById("win");
   winScreen.classList.add("show");
 },3000);
}
restart.onclick=()=>{
 clicks=0;
 p.style.width="0%";
 p.classList.remove("gold");
 label.textContent="0 / 100";
 wrap.classList.remove("blur");
 hud.classList.remove("blur");
 document.getElementById("win").classList.remove("show");
}
</script>
</body></html>
